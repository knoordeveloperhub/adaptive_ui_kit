name: adaptive_ui_kit
description: "A Flutter package for building platform-adaptive UIs with automatic switching between Glass (iOS/macOS) and Material (Android) design systems. Includes dialogs, action sheets, date/time pickers, and multi-select components."
version: 0.0.3
homepage: https://github.com/knoordeveloperhub/adaptive_ui_kit
repository: https://github.com/knoordeveloperhub/adaptive_ui_kit
issue_tracker: https://github.com/knoordeveloperhub/adaptive_ui_kit/issues


environment:
  sdk: ^3.4.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your package, add an assets section, like this:
  assets:
    - assets/screenshots/date_picker_glass.png 
    - assets/screenshots/date_picker_material.png 
    - assets/screenshots/time_picker_glass.png 
    - assets/screenshots/time_picker_material.png 
    - assets/screenshots/overview.png 
    - assets/screenshots/demo.gif
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
